endpoints:
  openAI:
    titleConvo: false
    summarize: false
    addParams:
      timeout: 300000
      chat_template_kwargs:
        enable_thinking: false
      presence_penalty: 1.5
  agents:
    model: "llmfan46/Qwen3.5-27B-heretic-v2"
    provider: "openAI"
    disableBuilder: false
    addParams:
      chat_template_kwargs:
        enable_thinking: false
      presence_penalty: 1.5
      temperature: 0.7
      top_p: 0.8
      top_k: 20
      max_tokens: 8192
  custom:
    - name: "KYNS"
      apiKey: "${OPENAI_API_KEY}"
      baseURL: "${OPENAI_REVERSE_PROXY}"
      iconURL: "https://raw.githubusercontent.com/Kyns-ai/config/main/files/kyns-favicon-32.png"
      modelDisplayLabel: "KYNS"
      models:
        default: ["llmfan46/Qwen3.5-27B-heretic-v2"]
      titleConvo: false
      summarize: false
      streamRate: 0
      addParams:
        timeout: 300000
        chat_template_kwargs:
          enable_thinking: false
        presence_penalty: 1.5
        temperature: 0.7
        top_p: 0.8
        top_k: 20
        max_tokens: 8192
    - name: "KYNSDeep"
      apiKey: "${OPENAI_API_KEY}"
      baseURL: "${OPENAI_REVERSE_PROXY}"
      iconURL: "https://raw.githubusercontent.com/Kyns-ai/config/main/files/kyns-favicon-32.png"
      modelDisplayLabel: "KYNS Deep"
      models:
        default: ["llmfan46/Qwen3.5-27B-heretic-v2"]
      titleConvo: false
      summarize: false
      streamRate: 0
      addParams:
        timeout: 300000
        chat_template_kwargs:
          enable_thinking: true
        temperature: 0.6
        top_p: 0.95
        top_k: 20
        max_tokens: 16000

    - name: "KYNSImage"
      apiKey: "kyns-image-internal"
      baseURL: "http://localhost:${PORT}/api/image-proxy"
      iconURL: "https://raw.githubusercontent.com/Kyns-ai/config/main/files/kyns-favicon-32.png"
      modelDisplayLabel: "KYNS Image"
      models:
        default: ["kyns-image"]
      titleConvo: false
      summarize: false
      addParams:
        timeout: 180000

webSearch:
  searchProvider: "searxng"
  searxngInstanceUrl: "${SEARXNG_INSTANCE_URL}"
  safeSearch: 0
  scraperProvider: "firecrawl"
  firecrawlApiKey: "${FIRECRAWL_API_KEY}"
  firecrawlApiUrl: "${FIRECRAWL_API_URL}"
  firecrawlOptions:
    formats: ["markdown"]
    excludeTags: ["nav", "footer", "header", ".ads", ".cookie", ".banner"]
    timeout: 15000
    waitFor: 2000
  scraperTimeout: 45000
