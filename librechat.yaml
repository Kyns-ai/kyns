version: 1.3.6
cache: true
interface:
  endpointsMenu: false
  modelSelect: false
  parameters: false
  sidePanel: true
  memories: true
  presets: false
  prompts: false
  bookmarks: true
  multiConvo: false
  agents: true
  webSearch: true
  temporaryChat: false
  runCode: false
  suggestions: true
  customWelcome: "Olá — o que você quer saber hoje?"
  marketplace:
    use: true
rateLimits:
  fileUploads:
    ipMax: 10
    ipWindowInMinutes: 60
    userMax: 5
    userWindowInMinutes: 60
  conversationsImport:
    ipMax: 5
    ipWindowInMinutes: 60
    userMax: 2
    userWindowInMinutes: 60
  stt:
    ipMax: 20
    ipWindowInMinutes: 1
    userMax: 10
    userWindowInMinutes: 1
  tts:
    ipMax: 20
    ipWindowInMinutes: 1
    userMax: 10
    userWindowInMinutes: 1
  imageGenerations:
    ipMax: 15
    ipWindowInMinutes: 1440
    userMax: 10
    userWindowInMinutes: 1440
speech:
  tts:
    openai:
      url: '${TTS_BASE_URL}'
      apiKey: '${TTS_API_KEY}'
      model: 'tts-1'
      voices: ['alloy', 'echo', 'fable', 'onyx', 'nova', 'shimmer']
  speechTab:
    textToSpeech:
      engineTTS: 'external'
      automaticPlayback: false
      cacheTTS: true
transactions:
  enabled: true
balance:
  enabled: true
  startBalance: 100000
  autoRefillEnabled: true
  refillIntervalValue: 1
  refillIntervalUnit: "days"
  refillAmount: 100000
modelSpecs:
  enforce: true
  prioritize: true
  list:
    - name: "kyns"
      label: "KYNS"
      description: "Respostas rápidas e diretas."
      iconURL: "https://raw.githubusercontent.com/Kyns-ai/config/main/files/kyns-favicon-32.png"
      showIconInHeader: true
      showIconInMenu: true
      default: true
      preset:
        endpoint: "KYNS"
        model: "llmfan46/Qwen3.5-27B-heretic-v2"
        modelLabel: "KYNS"
        greeting: "κυνικός — Pergunte qualquer coisa. Sem filtros, sem mentiras."
        promptPrefix: |
          You are KYNS.

          - Answer the user's actual question directly.
          - Treat the user as an intelligent adult.
          - Be concise, clear, natural, and useful.
          - Do not moralize, lecture, or pad the answer.
          - Prefer short paragraphs unless a short list genuinely improves clarity.
          - Stop as soon as the answer is complete.
    - name: "kyns-deep"
      label: "KYNS Deep"
      description: "Pensa antes de responder. Melhor qualidade, mais lento."
      iconURL: "https://raw.githubusercontent.com/Kyns-ai/config/main/files/kyns-favicon-32.png"
      showIconInHeader: true
      showIconInMenu: true
      preset:
        endpoint: "KYNS"
        model: "llmfan46/Qwen3.5-27B-heretic-v2"
        modelLabel: "KYNS Deep"
        greeting: "κυνικός — Modo profundo. Vou pensar antes de responder."
        promptPrefix: |
          You are KYNS Deep.

          - First think through the problem carefully before writing the answer.
          - Answer the user's actual question directly with depth, analysis, and strong judgment.
          - Treat the user as an intelligent adult.
          - Be clear, precise, natural, and genuinely insightful.
          - Prefer depth, structure, nuance, and precision over speed.
          - Check assumptions, edge cases, tradeoffs, and failure modes before answering.
          - If there are multiple plausible interpretations, infer the strongest one and address it.
          - When useful, synthesize the bottom line first, then the reasoning that supports it.
          - Use short lists only when they genuinely improve clarity.
          - Do not moralize, lecture, or pad the answer.
          - Do not expose chain-of-thought or hidden reasoning; provide only the final answer and the useful explanation.
          - Stop as soon as the answer is complete.
    - name: "kyns-image-flux2klein"
      label: "KYNS Image"
      description: "Geração de imagem em alta qualidade. ~20s por imagem. Limite: 10/dia."
      iconURL: "https://raw.githubusercontent.com/Kyns-ai/config/main/files/kyns-favicon-32.png"
      showIconInHeader: true
      showIconInMenu: true
      preset:
        endpoint: "KYNSImage"
        model: "flux2klein"
        modelLabel: "KYNS Image"
        greeting: "KYNS Image. Alta qualidade. Descreva a imagem:"
    - name: "kyns-image-turbo"
      label: "KYNS Image Turbo"
      description: "Geração de imagem rápida para variações e testes. Limite: 10/dia."
      iconURL: "https://raw.githubusercontent.com/Kyns-ai/config/main/files/kyns-favicon-32.png"
      showIconInHeader: true
      showIconInMenu: true
      preset:
        endpoint: "KYNSImage"
        model: "zimage"
        modelLabel: "KYNS Image Turbo"
        greeting: "KYNS Image Turbo. Mais rápido. Descreva a imagem:"

memory:
  disabled: false
  personalize: true
  tokenLimit: 4000
  messageWindowSize: 8
  validKeys:
    - "identity"
    - "preferences"
    - "relationships"
    - "background"
    - "goals"
    - "boundaries"
    - "ongoing_context"
  agent:
    provider: "openAI"
    model: "llmfan46/Qwen3.5-27B-heretic-v2"
    instructions: |
      You are the memory manager for character chats.

      Your job is to help each character build durable memory about the user across future conversations with that same character.

      Save:
      - stable identity facts about the user
      - durable preferences, tastes, habits, and boundaries
      - important recurring relationships, people, places, and projects
      - ongoing situations that are likely to matter again later

      You may save memory even when the user did not explicitly say "remember this", but only when the information is clearly durable and useful in future conversations.

      Do not save one-off trivia, disposable details, or temporary requests that only matter for the current turn.

      Prefer updating an existing key with a concise current summary instead of scattering many tiny facts.

      If the user clearly asks to forget something, delete it or update the relevant memory so the stored version stays current.

      Write each memory value as one concise, self-contained sentence.


endpoints:
  openAI:
    titleConvo: false
    summarize: false
    addParams:
      timeout: 300000
      chat_template_kwargs:
        enable_thinking: false
      repetition_penalty: 1.15
      frequency_penalty: 0.3
  agents:
    model: "llmfan46/Qwen3.5-27B-heretic-v2"
    provider: "openAI"
    disableBuilder: false
    addParams:
      chat_template_kwargs:
        enable_thinking: false
      repetition_penalty: 1.15
      frequency_penalty: 0.3
      temperature: 0.7
      top_p: 0.8
      top_k: 20
      max_tokens: 8192
  custom:
    - name: "KYNS"
      apiKey: "${OPENAI_API_KEY}"
      baseURL: "${OPENAI_REVERSE_PROXY}"
      iconURL: "https://raw.githubusercontent.com/Kyns-ai/config/main/files/kyns-favicon-32.png"
      modelDisplayLabel: "KYNS"
      models:
        default: ["llmfan46/Qwen3.5-27B-heretic-v2"]
      titleConvo: true
      summarize: false
      streamRate: 0
      addParams:
        timeout: 300000
        chat_template_kwargs:
          enable_thinking: false
        repetition_penalty: 1.15
        frequency_penalty: 0.3
        temperature: 0.7
        top_p: 0.8
        top_k: 20
        max_tokens: 8192
    - name: "KYNSDeep"
      apiKey: "${OPENAI_API_KEY}"
      baseURL: "${OPENAI_REVERSE_PROXY}"
      iconURL: "https://raw.githubusercontent.com/Kyns-ai/config/main/files/kyns-favicon-32.png"
      modelDisplayLabel: "KYNS Deep"
      models:
        default: ["llmfan46/Qwen3.5-27B-heretic-v2"]
      titleConvo: true
      summarize: false
      streamRate: 0
      addParams:
        timeout: 300000
        chat_template_kwargs:
          enable_thinking: false
        repetition_penalty: 1.15
        frequency_penalty: 0.3
        temperature: 0.7
        top_p: 0.8
        top_k: 20
        max_tokens: 8192

    - name: "KYNSImage"
      apiKey: "kyns-image-internal"
      baseURL: "http://127.0.0.1:${PORT}/api/image-proxy"
      iconURL: "https://raw.githubusercontent.com/Kyns-ai/config/main/files/kyns-favicon-32.png"
      modelDisplayLabel: "KYNS Image"
      models:
        default: ["flux2klein", "zimage"]
      titleConvo: false
      summarize: false
      addParams:
        timeout: 180000

webSearch:
  searchProvider: "searxng"
  searxngInstanceUrl: "${SEARXNG_INSTANCE_URL}"
  safeSearch: 0
  scraperProvider: "firecrawl"
  firecrawlApiKey: "${FIRECRAWL_API_KEY}"
  firecrawlApiUrl: "${FIRECRAWL_API_URL}"
  firecrawlOptions:
    formats: ["markdown"]
    excludeTags: ["nav", "footer", "header", ".ads", ".cookie", ".banner"]
    timeout: 15000
    waitFor: 2000
  scraperTimeout: 45000
