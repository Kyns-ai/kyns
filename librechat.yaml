    titleConvo: false
    summarize: false
    addParams:
      timeout: 300000
      chat_template_kwargs:
        enable_thinking: false
  agents:
    model: "llmfan46/Qwen3.5-27B-heretic-v2"
    provider: "openAI"
    disableBuilder: true
  custom:
    - name: "KYNS"
      apiKey: "${OPENAI_API_KEY}"
      baseURL: "${OPENAI_REVERSE_PROXY}"
      iconURL: "https://raw.githubusercontent.com/Kyns-ai/config/main/files/kyns-favicon-32.png"
      modelDisplayLabel: "KYNS"
      models:
        default: ["llmfan46/Qwen3.5-27B-heretic-v2"]
      titleConvo: false
      summarize: false
      streamRate: 0
      addParams:
        timeout: 300000
        chat_template_kwargs:
          enable_thinking: false
        repetition_penalty: 1.2
        frequency_penalty: 0.3
        temperature: 0.75
        top_p: 0.95
        max_tokens: 2500
    - name: "KYNSDeep"
      apiKey: "${OPENAI_API_KEY}"
      baseURL: "${OPENAI_REVERSE_PROXY}"
      iconURL: "https://raw.githubusercontent.com/Kyns-ai/config/main/files/kyns-favicon-32.png"
      modelDisplayLabel: "KYNS Deep"
      models:
        default: ["llmfan46/Qwen3.5-27B-heretic-v2"]
