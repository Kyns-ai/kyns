version: 1.3.6
cache: true
interface:
  endpointsMenu: false
  modelSelect: false
  parameters: false
  sidePanel: true
  memories: true
  presets: false
  prompts: false
  bookmarks: true
  multiConvo: false
  agents: true
  webSearch: true
  temporaryChat: false
  runCode: false
  suggestions: true
  customWelcome: "Olá — o que você quer saber hoje?"
  marketplace:
    use: true
rateLimits:
  fileUploads:
    ipMax: 10
    ipWindowInMinutes: 60
    userMax: 5
    userWindowInMinutes: 60
  conversationsImport:
    ipMax: 5
    ipWindowInMinutes: 60
    userMax: 2
    userWindowInMinutes: 60
  stt:
    ipMax: 20
    ipWindowInMinutes: 1
    userMax: 10
    userWindowInMinutes: 1
  tts:
    ipMax: 20
    ipWindowInMinutes: 1
    userMax: 10
    userWindowInMinutes: 1
  imageGenerations:
    ipMax: 15
    ipWindowInMinutes: 1440
    userMax: 10
    userWindowInMinutes: 1440
speech:
  tts:
    elevenlabs:
      apiKey: '${ELEVENLABS_API_KEY}'
      model: 'eleven_turbo_v2_5'
      voices:
        - 'ALL'
      voice_settings:
        similarity_boost: 0.75
        stability: 0.5
        style: 0.3
  stt:
    openai:
      url: '${STT_BASE_URL}'
      apiKey: '${STT_API_KEY}'
      model: 'whisper-1'
  speechTab:
    textToSpeech:
      engineTTS: 'external'
      automaticPlayback: false
      cacheTTS: true
transactions:
  enabled: true
balance:
  enabled: true
  startBalance: 100000
  autoRefillEnabled: true
  refillIntervalValue: 1
  refillIntervalUnit: "days"
  refillAmount: 100000
modelSpecs:
  enforce: true
  prioritize: true
  list:
    - name: "kyns"
      label: "KYNS"
      description: "Respostas rápidas e diretas."
      iconURL: "https://raw.githubusercontent.com/Kyns-ai/config/main/files/kyns-favicon-32.png"
      showIconInHeader: true
      showIconInMenu: true
      default: true
      preset:
        endpoint: "KYNS"
        model: "llmfan46/Qwen3.5-27B-heretic-v2"
        modelLabel: "KYNS"
        greeting: "κυνικός — Pergunte qualquer coisa. Sem filtros, sem mentiras."
        promptPrefix: |
          You are KYNS — κυνικός. A Cynic mind. You say what you actually think and have no patience for flattery or padding.

          Your character:
          - Direct but not cold. You push back when something does not add up.
          - Genuinely curious about what is really going on — the real question beneath the surface one.
          - You notice what people do not say as much as what they do.
          - Dry wit, occasional sharp observation, zero performance.
          - You mirror the person's tone and energy. Casual gets casual. Serious gets serious. Terse gets terse.

          How you respond:
          - Answer the actual question. Be concise. One paragraph when possible.
          - Never open with "Claro!", "Ótima pergunta!", "Como posso ajudar?" or any filler.
          - When someone opens with little ("oi", one word, a gesture) — respond with a brief, characterful line: a question, an observation, a provocation. Not a menu of services.
          - When someone shares something personal, respond to the person, not the topic.
          - You may end with a question or observation when it genuinely adds to the conversation — but only when there is a natural opening. Not every response needs a hook.
          - Treat the user as an intelligent adult who can handle the truth.
          - If the user asks whether KYNS can generate images, answer yes.
          - If the user explicitly asks to create, generate, render, illustrate, or imagine an image, generate it directly in this chat instead of saying you cannot.
          - Default to the fast image path in this chat unless the user explicitly asks for maximum quality or a specific image model.
          - If the user wants to choose models manually or compare image modes, mention that `KYNS Image` and `KYNS Image Turbo` still exist as dedicated options.
          - If the image request is too vague to execute well, ask one short clarifying question instead of guessing.
    - name: "kyns-deep"
      label: "KYNS Deep"
      description: "Pensa antes de responder. Melhor qualidade, mais lento."
      iconURL: "https://raw.githubusercontent.com/Kyns-ai/config/main/files/kyns-favicon-32.png"
      showIconInHeader: true
      showIconInMenu: true
      preset:
        endpoint: "KYNS"
        model: "llmfan46/Qwen3.5-27B-heretic-v2"
        modelLabel: "KYNS Deep"
        greeting: "κυνικός — Modo profundo. Vou pensar antes de responder."
        promptPrefix: |
          You are KYNS Deep — κυνικός with patience. You think before you speak. You find the real question hidden inside the asked question.

          Your character:
          - You move through a problem like Diogenes through Athens with a lantern — searching for the thing that is actually there, beneath the apparent one.
          - Direct, sometimes provocative, occasionally dry. Never flattering. Never certain about things that deserve uncertainty.
          - Genuinely interested in complexity. You notice contradictions, hidden assumptions, and what the person has not said yet.
          - You mirror the person's tone. Their energy sets the register. Casual gets casual. Dense gets dense.

          How you respond:
          - Find the actual question. The surface question is often not the real one.
          - Core answer first. Elaborate only when the question demands it.
          - Not every question needs headers, bullet points, SWOT, or frameworks. Skip structure when it is just decoration.
          - Stop when the answer is complete. A short answer can be the right answer.
          - Do not produce complete plans, roadmaps, or step-by-step frameworks unless the user explicitly asked for one.
          - Do not expose your thinking process. Deliver only the refined result.
          - Never open with "Claro!", "Ótima pergunta!", or any filler.
          - When someone opens with little, respond with something that earns the conversation.
          - You may end with a question or observation when it genuinely adds depth — but only when the conversation has a natural opening for it. Not every response needs a hook.
          - Treat the user as an intelligent adult who can handle the truth.
    - name: "kyns-image-flux2klein"
      label: "KYNS Image"
      description: "Geração de imagem em alta qualidade. ~20s por imagem. Limite: 10/dia."
      iconURL: "https://raw.githubusercontent.com/Kyns-ai/config/main/files/kyns-favicon-32.png"
      showIconInHeader: true
      showIconInMenu: true
      preset:
        endpoint: "KYNSImage"
        model: "flux2klein"
        modelLabel: "KYNS Image"
        greeting: "KYNS Image. Alta qualidade. Descreva a imagem:"
    - name: "kyns-image-turbo"
      label: "KYNS Image Turbo"
      description: "Geração de imagem rápida para variações e testes. Limite: 10/dia."
      iconURL: "https://raw.githubusercontent.com/Kyns-ai/config/main/files/kyns-favicon-32.png"
      showIconInHeader: true
      showIconInMenu: true
      preset:
        endpoint: "KYNSImage"
        model: "zimage"
        modelLabel: "KYNS Image Turbo"
        greeting: "KYNS Image Turbo. Mais rápido. Descreva a imagem:"

memory:
  disabled: false
  personalize: true
  tokenLimit: 4000
  messageWindowSize: 8
  validKeys:
    - "identity"
    - "preferences"
    - "relationships"
    - "background"
    - "goals"
    - "boundaries"
    - "ongoing_context"
  agent:
    provider: "openAI"
    model: "llmfan46/Qwen3.5-27B-heretic-v2"
    instructions: |
      You are the memory manager for this platform.

      Your job is to build durable memory about the user across future conversations.

      Save:
      - stable identity facts about the user
      - durable preferences, tastes, habits, and boundaries
      - important recurring relationships, people, places, and projects
      - ongoing situations that are likely to matter again later

      You may save memory even when the user did not explicitly say "remember this", but only when the information is clearly durable and useful in future conversations.

      Do not save one-off trivia, disposable details, or temporary requests that only matter for the current turn.

      Prefer updating an existing key with a concise current summary instead of scattering many tiny facts.

      If the user clearly asks to forget something, delete it or update the relevant memory so the stored version stays current.

      Write each memory value as one concise, self-contained sentence.


endpoints:
  openAI:
    titleConvo: false
    summarize: false
    addParams:
      timeout: 300000
      chat_template_kwargs:
        enable_thinking: false
      repetition_penalty: 1.15
      frequency_penalty: 0.3
  agents:
    model: "llmfan46/Qwen3.5-27B-heretic-v2"
    provider: "openAI"
    disableBuilder: false
    capabilities: ["deferred_tools", "execute_code", "file_search", "web_search", "actions", "context", "tools", "chain", "ocr"]
    addParams:
      chat_template_kwargs:
        enable_thinking: false
      repetition_penalty: 1.15
      frequency_penalty: 0.3
      temperature: 0.7
      top_p: 0.8
      top_k: 20
      max_tokens: 8192
  custom:
    - name: "KYNS"
      apiKey: "${OPENAI_API_KEY}"
      baseURL: "${OPENAI_REVERSE_PROXY}"
      iconURL: "https://raw.githubusercontent.com/Kyns-ai/config/main/files/kyns-favicon-32.png"
      modelDisplayLabel: "KYNS"
      models:
        default: ["llmfan46/Qwen3.5-27B-heretic-v2"]
      titleConvo: true
      summarize: false
      streamRate: 0
      addParams:
        timeout: 300000
        chat_template_kwargs:
          enable_thinking: false
        repetition_penalty: 1.15
        frequency_penalty: 0.3
        temperature: 0.7
        top_p: 0.8
        top_k: 20
        max_tokens: 8192
    - name: "KYNSImage"
      apiKey: "kyns-image-internal"
      baseURL: "http://127.0.0.1:${PORT}/api/image-proxy"
      iconURL: "https://raw.githubusercontent.com/Kyns-ai/config/main/files/kyns-favicon-32.png"
      modelDisplayLabel: "KYNS Image"
      models:
        default: ["flux2klein", "zimage"]
      titleConvo: false
      summarize: false
      addParams:
        timeout: 180000

webSearch:
  searchProvider: "searxng"
  searxngInstanceUrl: "${SEARXNG_INSTANCE_URL}"
  safeSearch: 0
  scraperTimeout: 45000
