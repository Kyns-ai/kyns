# Rate limiter config for SearXNG — KYNS internal instance
# Since only LibreChat connects, we disable all rate limiting.

[real_ip]
  # Trust all X-Forwarded-For headers (internal network)
  x_for = 1
  ipv4_prefix = 32
  ipv6_prefix = 48

[botdetection.ip_limit]
  # Disable IP-based request limiting
  filter_link_local = false
  link_token = false

[botdetection.ip_lists]
  # Allow all IPs — this instance is internal only (not public)
  pass_ip = [
    "0.0.0.0/0",
    "::/0"
  ]
