name: Bug Report
description: File a bug report
title: "[Bug]: "
labels: ["🐛 bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report!

        Before submitting, please:
        - Search [existing issues](https://github.com/Kyns-ai/kyns/issues) to avoid duplicates
        - Make sure you're on the latest version

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug.
      placeholder: Tell us what you see
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: How can we reproduce the bug?
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: |
        Node.js version, OS, browser, deployment method (Docker, Railway, local), etc.
      placeholder: |
        - Node.js: 20.x
        - OS: macOS / Linux / Windows
        - Browser: Chrome 131
        - Deployment: Docker / Railway / Local
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or screenshots
      description: Paste any relevant logs or screenshots here.
    validations:
      required: false
